<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鄰里生活服務管理 - 陸府建設 CRM</title>

    <!-- Font Awesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS 樣式 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/breadcrumb.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="css/pagination.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/case-list.css">
    <link rel="stylesheet" href="css/reservation-table.css">
    <link rel="stylesheet" href="css/member-life-service.css">
</head>
<body>
    <div class="app-container">

        <!-- 頂部導覽列 -->
        <div id="header-container"></div>

        <!-- 側邊欄 -->
        <div id="sidebar-container"></div>

        <!-- 主內容 -->
        <main class="main-content">

            <!-- 麵包屑 -->
            <div class="breadcrumb">
                <a href="index.html" class="breadcrumb-item">
                    <i class="fa-solid fa-house"></i> 首頁
                </a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item">會員管理</span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item active">鄰里生活服務管理</span>
            </div>

            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">鄰里生活服務管理</h1>
                </div>

                <!-- ==============================
                     頁籤導覽
                     ============================== -->
                <nav class="tab-nav">
                    <button class="tab-btn active" data-tab="tab-category">
                        分類管理
                    </button>
                    <button class="tab-btn" data-tab="tab-service">
                        服務項目管理
                    </button>
                    <button class="tab-btn" data-tab="tab-reservation">
                        預約紀錄
                    </button>
                </nav>

                <!-- ==============================
                     Tab 1：分類管理
                     ============================== -->
                <div class="tab-panel active" id="tab-category">
                    <div class="toolbar">
                        <button class="btn btn-success" id="btnAddCategory">
                            新增分類
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table" id="categoryTable">
                            <thead>
                                <tr>
                                    <th class="col-1">序號</th>
                                    <th class="col-2">分類名稱</th>
                                    <th class="col-1">排序</th>
                                    <th class="col-1">狀態</th>
                                    <th class="col-1">操作</th>
                                </tr>
                            </thead>
                            <tbody id="categoryTableBody">
                                <!-- JS 動態產生 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- ==============================
                     Tab 2：服務項目管理
                     ============================== -->
                <div class="tab-panel" id="tab-service">
                    <!-- 查詢列 -->
                    <div class="search-panel">
                        <form class="search-form case-search-form" id="serviceSearchForm">
                            <div class="search-grid">
                                <div class="form-group row">
                                    <label class="form-label col-label">所屬分類</label>
                                    <div class="col-input">
                                        <select class="form-select" id="searchServiceCategory">
                                            <option value="">全部</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <label class="form-label col-label">服務名稱</label>
                                    <div class="col-input">
                                        <input type="text" class="form-input" id="searchServiceName" placeholder="請輸入服務名稱">
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <label class="form-label col-label">負責人</label>
                                    <div class="col-input">
                                        <input type="text" class="form-input" id="searchServiceManager" placeholder="請輸入負責人">
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <label class="form-label col-label">狀態</label>
                                    <div class="col-input">
                                        <select class="form-select" id="searchServiceStatus">
                                            <option value="">全部</option>
                                            <option value="啟用">啟用</option>
                                            <option value="停用">停用</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="form-actions-right">
                                <button type="reset" class="btn btn-info" id="btnServiceReset">
                                    重置
                                </button>
                                <button type="submit" class="btn btn-info">
                                    查詢
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="toolbar">
                        <button class="btn btn-success" id="btnAddService">
                            新增服務項目
                        </button>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table" id="serviceTable">
                            <thead>
                                <tr>
                                    <th class="col-1">序號</th>
                                    <th class="col-1">流水號</th>
                                    <th class="col-2">服務名稱</th>
                                    <th class="col-1">所屬分類</th>
                                    <th class="col-2">優惠標語</th>
                                    <th class="col-1">廠商名稱</th>
                                    <th class="col-1">聯絡電話</th>
                                    <th class="col-1">負責人</th>
                                    <th class="col-1">適用案場</th>
                                    <th class="col-1">顯示期間</th>
                                    <th class="col-1">狀態</th>
                                    <th class="col-1">操作</th>
                                </tr>
                            </thead>
                            <tbody id="serviceTableBody">
                                <!-- JS 動態產生 -->
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-wrapper" id="servicePaginationWrapper"></div>
                </div>

                <!-- ==============================
                     Tab 3：預約紀錄
                     ============================== -->
                <div class="tab-panel" id="tab-reservation">
                    <!-- 查詢列 -->
                    <div class="search-panel">
                        <form class="search-form case-search-form" id="reservationSearchForm">
                            <div class="search-grid">
                                <div class="form-group row">
                                    <label class="form-label col-label">服務項目</label>
                                    <div class="col-input">
                                        <select class="form-select" id="searchResService">
                                            <option value="">全部</option>
                                        </select>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <label class="form-label col-label">戶別</label>
                                    <div class="col-input">
                                        <input type="text" class="form-input" id="searchResUnit" placeholder="請輸入戶別">
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <label class="form-label col-label">預約日期</label>
                                    <div class="col-input">
                                        <div class="date-range-group">
                                            <input type="date" class="form-input" id="searchResDateFrom">
                                            <span class="date-separator">~</span>
                                            <input type="date" class="form-input" id="searchResDateTo">
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <label class="form-label col-label">狀態</label>
                                    <div class="col-input">
                                        <select class="form-select" id="searchResStatus">
                                            <option value="">全部</option>
                                            <option value="待確認">待確認</option>
                                            <option value="已確認">已確認</option>
                                            <option value="已完成">已完成</option>
                                            <option value="已取消">已取消</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                            <div class="form-actions-right">
                                <button type="reset" class="btn btn-info" id="btnResReset">
                                    重置
                                </button>
                                <button type="submit" class="btn btn-info">
                                    查詢
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table" id="reservationTable">
                            <thead>
                                <tr>
                                    <th class="col-1">序號</th>
                                    <th class="col-2">預約編號</th>
                                    <th class="col-2">服務項目</th>
                                    <th class="col-1">所屬分類</th>
                                    <th class="col-1">戶別</th>
                                    <th class="col-1">姓名</th>
                                    <th class="col-1">聯絡電話</th>
                                    <th class="col-1">預約日期</th>
                                    <th class="col-1">預約時段</th>
                                    <th class="col-2">備注</th>
                                    <th class="col-1">負責人</th>
                                    <th class="col-1">狀態</th>
                                    <th class="col-1">申請時間</th>
                                    <th class="col-1">操作</th>
                                </tr>
                            </thead>
                            <tbody id="reservationTableBody">
                                <!-- JS 動態產生 -->
                            </tbody>
                        </table>
                    </div>
                    <div class="pagination-wrapper" id="reservationPaginationWrapper"></div>
                </div>

            </div><!-- /content-wrapper -->
        </main>
    </div><!-- /app-container -->

    <!-- ==============================
         分類 新增/編輯 彈窗
         ============================== -->
    <div class="modal" id="categoryModal">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="categoryModalTitle">新增分類</h3>
                <button class="modal-close" id="categoryModalClose">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <input type="hidden" id="categoryId">
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label class="form-label required">分類名稱</label>
                            <input type="text" class="form-input" id="categoryName" placeholder="例：家政服務" required>
                        </div>
                        <div class="form-group flex-120">
                            <label class="form-label required">圖示（Emoji）</label>
                            <input type="text" class="form-input" id="categoryIcon" placeholder="🧹" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group flex-120">
                            <label class="form-label required">排序</label>
                            <input type="number" class="form-input" id="categorySort" min="1" value="1" required>
                        </div>
                        <div class="form-group flex-1">
                            <label class="form-label required">狀態</label>
                            <select class="form-select" id="categoryStatus" required>
                                <option value="啟用">啟用</option>
                                <option value="停用">停用</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="categoryBtnCancel">取消</button>
                <button class="btn btn-primary" id="categoryBtnSave">儲存</button>
            </div>
        </div>
    </div>

    <!-- ==============================
         服務項目 新增/編輯 彈窗
         ============================== -->
    <div class="modal" id="serviceModal">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="serviceModalTitle">新增服務項目</h3>
                <button class="modal-close" id="serviceModalClose">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="serviceForm">
                    <input type="hidden" id="serviceId">
                    <!-- 系統流水號（唯讀） -->
                    <div class="form-row" id="serviceNoRow" style="display:none">
                        <div class="form-group flex-1">
                            <label class="form-label">系統流水號</label>
                            <input type="text" class="form-input" id="serviceNo" readonly style="background:#f5f5f5;color:#9e9e9e;">
                        </div>
                    </div>
                    <!-- 第一列：排序 + 狀態（移至最上方） -->
                    <div class="form-row">
                        <div class="form-group flex-120">
                            <label class="form-label required">排序</label>
                            <input type="number" class="form-input" id="serviceSort" min="1" value="1" required>
                        </div>
                        <div class="form-group flex-120">
                            <label class="form-label required">狀態</label>
                            <select class="form-select" id="serviceStatus" required>
                                <option value="啟用">啟用</option>
                                <option value="停用">停用</option>
                            </select>
                        </div>
                        <div class="form-group flex-1">
                            <label class="form-label">顯示起始日</label>
                            <input type="date" class="form-input" id="serviceDisplayFrom">
                        </div>
                        <div class="form-group flex-1">
                            <label class="form-label">顯示截止日</label>
                            <input type="date" class="form-input" id="serviceDisplayTo">
                        </div>
                    </div>
                    <!-- 第二列：服務名稱 + 圖示 -->
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label class="form-label required">服務名稱</label>
                            <input type="text" class="form-input" id="serviceName" placeholder="例：專業乾洗" required>
                        </div>
                        <div class="form-group flex-120">
                            <label class="form-label">圖示圖片</label>
                            <!-- 圖示上傳元件 -->
                            <div class="icon-upload-area" id="serviceIconUploadArea" title="點擊選擇圖片">
                                <!-- 隱藏的原生檔案輸入 -->
                                <input type="file" id="serviceIconFile" accept="image/*" style="display:none">
                                <!-- 上傳後預覽 -->
                                <img id="serviceIconPreview" src="" alt="圖示預覽" style="display:none">
                                <!-- 尚未上傳時的提示文字 -->
                                <span class="icon-upload-placeholder" id="serviceIconPlaceholder">
                                    <i class="fa-solid fa-image"></i>
                                    <span>點擊上傳</span>
                                </span>
                                <!-- 清除按鈕（疊加於右上角） -->
                                <button type="button" class="icon-clear-btn" id="serviceIconClearBtn"
                                    title="清除圖示" style="display:none">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                            <!-- 儲存圖片 data URL 的隱藏欄位 -->
                            <input type="hidden" id="serviceIconData">
                        </div>
                    </div>
                    <!-- 第三列：分類 + 優惠標語 -->
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label class="form-label required">所屬分類</label>
                            <select class="form-select" id="serviceCategory" required>
                                <option value="">請選擇</option>
                            </select>
                        </div>
                        <div class="form-group flex-1">
                            <label class="form-label required">優惠標語</label>
                            <input type="text" class="form-input" id="serviceDiscount" placeholder="例：滿 500 打 9 折" required>
                        </div>
                    </div>
                    <!-- 第四列：廠商 -->
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label class="form-label required">廠商名稱</label>
                            <input type="text" class="form-input" id="serviceVendor" placeholder="例：潔淨乾洗坊" required>
                        </div>
                        <div class="form-group flex-1">
                            <label class="form-label">廠商聯絡電話</label>
                            <input type="text" class="form-input" id="serviceVendorPhone" placeholder="例：02-1234-5678">
                        </div>
                    </div>
                    <!-- 第五列：負責人（僅姓名，移除電話） -->
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label class="form-label required">負責人姓名</label>
                            <input type="text" class="form-input" id="serviceManager" placeholder="例：王小美" required>
                        </div>
                    </div>
                    <!-- 第六列：適用案場（複選） -->
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label class="form-label">適用案場</label>
                            <div class="site-checkbox-group" id="serviceSiteGroup">
                                <!-- JS 動態產生 -->
                            </div>
                        </div>
                    </div>
                    <!-- 第七列：優惠說明（Rich Text） -->
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label class="form-label required">社區專屬優惠說明</label>
                            <div class="richtext-toolbar" data-target="serviceOffer">
                                <button type="button" class="rt-btn" data-cmd="bold" title="粗體"><i class="fa-solid fa-bold"></i></button>
                                <button type="button" class="rt-btn" data-cmd="italic" title="斜體"><i class="fa-solid fa-italic"></i></button>
                                <button type="button" class="rt-btn" data-cmd="underline" title="底線"><i class="fa-solid fa-underline"></i></button>
                                <span class="rt-sep"></span>
                                <button type="button" class="rt-btn" data-cmd="insertUnorderedList" title="項目清單"><i class="fa-solid fa-list-ul"></i></button>
                                <button type="button" class="rt-btn" data-cmd="insertOrderedList" title="編號清單"><i class="fa-solid fa-list-ol"></i></button>
                            </div>
                            <div class="richtext-editor" id="serviceOffer" contenteditable="true" data-placeholder="詳細優惠內容說明..."></div>
                        </div>
                    </div>
                    <!-- 第八列：服務說明（Rich Text） -->
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label class="form-label required">服務內容說明</label>
                            <div class="richtext-toolbar" data-target="serviceDesc">
                                <button type="button" class="rt-btn" data-cmd="bold" title="粗體"><i class="fa-solid fa-bold"></i></button>
                                <button type="button" class="rt-btn" data-cmd="italic" title="斜體"><i class="fa-solid fa-italic"></i></button>
                                <button type="button" class="rt-btn" data-cmd="underline" title="底線"><i class="fa-solid fa-underline"></i></button>
                                <span class="rt-sep"></span>
                                <button type="button" class="rt-btn" data-cmd="insertUnorderedList" title="項目清單"><i class="fa-solid fa-list-ul"></i></button>
                                <button type="button" class="rt-btn" data-cmd="insertOrderedList" title="編號清單"><i class="fa-solid fa-list-ol"></i></button>
                            </div>
                            <div class="richtext-editor" id="serviceDesc" contenteditable="true" data-placeholder="服務流程及詳細說明..."></div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="serviceBtnCancel">取消</button>
                <button class="btn btn-primary" id="serviceBtnSave">儲存</button>
            </div>
        </div>
    </div>

    <!-- ==============================
         預約紀錄 狀態變更 彈窗
         ============================== -->
    <div class="modal" id="reservationModal">
        <div class="modal-overlay"></div>
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title">預約詳情</h3>
                <button class="modal-close" id="reservationModalClose">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <!-- 唯讀資訊 -->
                <div id="reservationDetailView" class="detail-section">
                    <table class="detail-table">
                        <tbody id="reservationDetailBody"></tbody>
                    </table>
                </div>
                <!-- 狀態更新 -->
                <div class="form-row">
                    <div class="form-group flex-1">
                        <label class="form-label required">更新狀態</label>
                        <select class="form-select" id="resNewStatus">
                            <option value="待確認">待確認</option>
                            <option value="已確認">已確認</option>
                            <option value="已完成">已完成</option>
                            <option value="已取消">已取消</option>
                        </select>
                    </div>
                    <div class="form-group flex-2">
                        <label class="form-label">備注 / 聯繫紀錄</label>
                        <input type="text" class="form-input" id="resAdminNote" placeholder="請輸入處理說明...">
                    </div>
                </div>
                <input type="hidden" id="resEditId">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="reservationBtnCancel">關閉</button>
                <button class="btn btn-primary" id="reservationBtnSave">儲存變更</button>
            </div>
        </div>
    </div>

    <!-- ==============================
         JavaScript
         ============================== -->
    <script src="js/menu-component.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/member-life-service-mock-data.js"></script>
    <script src="js/member-life-service.js"></script>

</body>
</html>
