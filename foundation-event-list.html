<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基金會活動設定 - 陸府建設 CRM</title>
    
    <!-- Font Awesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS 樣式 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/breadcrumb.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="css/pagination.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/foundation-event.css">
    <link rel="stylesheet" href="css/toast.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- 主容器 -->
    <!-- ============================================ -->
    <div class="app-container">
        
        <!-- ============================================ -->
        <!-- 頂部導覽列 (動態渲染) -->
        <!-- ============================================ -->
        <div id="header-container"></div>

        <!-- ============================================ -->
        <!-- 側邊欄選單 (動態渲染) -->
        <!-- ============================================ -->
        <div id="sidebar-container"></div>

        <!-- ============================================ -->
        <!-- 主內容區域 -->
        <!-- ============================================ -->
        <main class="main-content">
            <!-- 麵包屑導覽 -->
            <div class="breadcrumb">
                <a href="index.html" class="breadcrumb-item">
                    <i class="fa-solid fa-house"></i>
                    首頁
                </a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item">官網活動(基金會)</span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item active">活動設定</span>
            </div>

            <!-- 頁面標題列 -->
            <div class="page-header-bar">
                <div class="page-header-left">
                    <h2 class="page-main-title">美學活動管理</h2>
                    <span class="page-sub-title">Activity Manage list</span>
                    <span class="page-data-info" id="pageDataInfo">頁次 1 / 1 共有 0 筆資料</span>
                    <select class="form-select form-select-sm" id="filterAllData">
                        <option value="">全部資料</option>
                        <option value="visible">已上架</option>
                        <option value="hidden">未上架</option>
                    </select>
                    <span class="page-keyword-label">| 關鍵字：</span>
                    <input type="text" class="form-control form-control-sm" id="searchKeyword" placeholder="輸入關鍵字...">
                    <button type="button" class="btn btn-primary btn-sm" id="btnKeywordSearch">搜尋</button>
                </div>
                <div class="page-header-right">
                    <button class="btn btn-primary btn-sm" id="btnSync">
                        <i class="fa-solid fa-sync"></i> 手動同步
                    </button>
                </div>
            </div>
                <!-- 資料表格 -->
                <div class="table-container">
                    <table class="foundation-table" id="eventTable">
                        <thead>
                            <tr>
                                <th>標題</th>
                                <th width="100">日期</th>
                                <th width="60">顯示</th>
                                <th width="60">置頂</th>
                                <th width="80">住戶限定</th>
                                <th width="80">表單顯示</th>
                                <th width="150">建立日期</th>
                                <th width="200">功能</th>
                            </tr>
                        </thead>
                        <tbody id="eventTableBody">
                            <!-- JavaScript 動態產生 -->
                        </tbody>
                    </table>
                </div>

                <!-- 分頁元件 -->
                <div class="pagination-wrapper" id="paginationWrapper">
                </div>
            </div>
        </main>
    </div>

    <!-- ============================================ -->
    <!-- Toast 提示容器 -->
    <!-- ============================================ -->
    <div class="toast-container"></div>

    <!-- ============================================ -->
    <!-- JavaScript -->
    <!-- ============================================ -->
    <script src="js/menu-component.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/foundation-mock-data.js"></script>
    <script src="js/foundation-event.js"></script>
    <script>
        // 初始化側邊欄
        document.addEventListener('DOMContentLoaded', function() {
            // 渲染共用元件
            if (typeof initCRMLayout === 'function') {
                initCRMLayout();
            }
            
            // 初始化側邊欄
            const sidebarManager = new SidebarManager();
        });
    </script>

    <style>
        /* 頁面標題列 */
        .page-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid var(--color-gray-300);
            flex-wrap: wrap;
            gap: 8px;
        }
        .page-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .page-main-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-gray-900);
            margin: 0;
        }
        .page-sub-title {
            color: var(--color-gray-500);
            font-size: 13px;
        }
        .page-data-info {
            color: var(--color-gray-700);
            font-size: 13px;
        }
        .page-keyword-label {
            color: var(--color-gray-700);
            font-size: 13px;
        }
        .form-select-sm, .form-control-sm {
            height: 30px;
            padding: 2px 8px;
            font-size: 13px;
        }
        .form-control-sm {
            width: 140px;
        }
        .btn-sm {
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid;
            background: transparent;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        /* checkbox 欄位置中 */
        .foundation-table td.cell-bool,
        .foundation-table th {
            text-align: center;
        }

        /* boolean checkbox 欄位（顯示/置頂/住戶限定/表單顯示）*/
        .cell-bool {
            text-align: center;
        }
        .cell-bool input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--color-info);
            pointer-events: none;
        }

        /* 表格容器 */
        .table-container {
            background-color: #fff;
            overflow-x: auto;
        }

        /* 操作按鈕容器 */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* 分頁容器 */
        .pagination-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            gap: 8px;
            background-color: #fff;
        }

        .pagination-info {
            text-align: center;
            color: #333;
            font-size: 14px;
        }

        /* 內容包裝器 */
        .content-wrapper {
            background-color: #fff;
            padding: 0;
        }

        /* 同步中旋轉動畫 */
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spinning {
            animation: spin 1s linear infinite;
        }
    </style>
</body>
</html>
