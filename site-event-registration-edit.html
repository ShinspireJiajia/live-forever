<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案場活動報名紀錄審核 - 陸府建設 CRM</title>
    
    <!-- Font Awesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS 樣式 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/breadcrumb.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="css/pagination.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/site-event.css">
    <link rel="stylesheet" href="css/site-event-registration-edit.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- 主容器 -->
    <!-- ============================================ -->
    <div class="app-container">
        
        <!-- ============================================ -->
        <!-- 頂部導覽列 (動態渲染) -->
        <!-- ============================================ -->
        <div id="header-container"></div>

        <!-- ============================================ -->
        <!-- 側邊欄選單 (動態渲染) -->
        <!-- ============================================ -->
        <div id="sidebar-container"></div>

        <!-- ============================================ -->
        <!-- 主內容區域 -->
        <!-- ============================================ -->
        <main class="main-content">
            <!-- 麵包屑導覽 -->
            <div class="breadcrumb">
                <a href="index.html" class="breadcrumb-item">
                    <i class="fa-solid fa-house"></i>
                    首頁
                </a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item">案場活動</span>
                <span class="breadcrumb-separator">/</span>
                <a href="site-event-registration.html" class="breadcrumb-item">報名紀錄</a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item active">報名審核</span>
            </div>

            <!-- 頁面內容 -->
            <div class="content-wrapper">
                <div class="page-header">
                    <h1 class="page-title">報名紀錄</h1>
                    <p class="page-subtitle">查看報名詳情</p>
                </div>

                <!-- 報名者資訊 -->
                <div class="detail-section">
                    <h3 class="detail-section-title">
                        <i class="fa-solid fa-user"></i>
                        報名者資訊
                    </h3>
                    <div class="detail-grid" id="registrantInfo">
                        <!-- JavaScript 動態產生 -->
                    </div>
                </div>

                <!-- 活動資訊 -->
                <div class="detail-section">
                    <h3 class="detail-section-title">
                        <i class="fa-solid fa-calendar-alt"></i>
                        活動資訊
                    </h3>
                    <div class="detail-grid" id="eventInfo">
                        <!-- JavaScript 動態產生 -->
                    </div>
                </div>

                <!-- 繳費狀態與操作 -->
                <div class="detail-section">
                    <h3 class="detail-section-title">
                        <i class="fa-solid fa-dollar-sign"></i>
                        繳費狀態
                    </h3>
                    <div id="paymentSection">
                        <!-- JavaScript 動態產生 -->
                    </div>
                </div>

                <!-- 操作日誌 -->
                <div class="detail-section">
                    <h3 class="detail-section-title">
                        <i class="fa-solid fa-history"></i>
                        操作日誌
                    </h3>
                    <div class="timeline" id="auditTimeline">
                        <!-- JavaScript 動態產生 -->
                    </div>
                </div>

                <!-- 操作按鈕 -->
                <div class="form-actions" style="margin-top: 24px;">
                    <button type="button" class="btn btn-secondary" onclick="history.back()">
                        <i class="fa-solid fa-arrow-left"></i>
                        返回列表
                    </button>
                    <button type="button" class="btn btn-danger" id="btnRefundRequest">
                        <i class="fa-solid fa-rotate-left"></i>
                        取消報名
                    </button>
                    <button type="button" class="btn btn-primary" id="btnSave">
                        <i class="fa-solid fa-save"></i>
                        儲存
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- ============================================ -->
    <!-- 申請退款彈窗 -->
    <!-- ============================================ -->
    <div class="modal" id="refundModal" style="background-color: rgba(0, 0, 0, 0.5);">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 class="modal-title">取消報名</h3>
                <button class="modal-close" onclick="closeModal('refundModal')">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="alert alert-warning" style="margin-bottom: 16px;">
                    <i class="fa-solid fa-exclamation-triangle"></i>
                    <span>操作將記錄於系統日誌</span>
                </div>
                <div class="form-group">
                    <label class="form-label">應退款金額</label>
                    <div class="refund-amount" id="refundAmount">$0</div>
                </div>
                <div class="form-group">
                    <label class="form-label">備註說明 <span class="text-danger">*</span></label>
                    <textarea class="form-textarea" id="refundNote" rows="3" placeholder="請輸入備註說明..."></textarea>
                </div>
                <!-- 附件上傳區塊 -->
                <div class="form-group">
                    <label class="form-label">附件上傳</label>
                    <div class="file-upload-area" id="refundFileDropZone">
                        <input type="file" class="file-upload-input" id="refundFileInput" multiple accept=".jpg,.jpeg,.pdf">
                        <div class="file-upload-content">
                            <i class="fa-solid fa-cloud-upload-alt" style="font-size: 32px; color: var(--color-gray-500); margin-bottom: 8px;"></i>
                            <p style="margin: 0; color: var(--color-gray-700);">點擊或拖曳檔案至此處上傳</p>
                            <p style="margin: 4px 0 0; font-size: 12px; color: var(--color-gray-500);">支援格式：JPG, PDF（單檔最大 10MB）</p>
                        </div>
                    </div>
                    <!-- 已上傳檔案列表 -->
                    <div class="uploaded-files-list" id="refundUploadedFiles"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('refundModal')">取消</button>
                <button type="button" class="btn btn-danger" id="btnConfirmRefund">
                    <i class="fa-solid fa-check"></i>
                    確認退款
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 退款完成彈窗 -->
    <!-- ============================================ -->
    <div class="modal" id="refundCompleteModal" style="background-color: rgba(0, 0, 0, 0.5);">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h3 class="modal-title">確認退款完成</h3>
                <button class="modal-close" onclick="closeModal('refundCompleteModal')">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info" style="margin-bottom: 16px; background: #e3f2fd; color: #1565c0;">
                    <i class="fa-solid fa-info-circle"></i>
                    <span>請上傳退款證明後確認完成</span>
                </div>
                <div class="form-group">
                    <label class="form-label">退款金額</label>
                    <div class="refund-amount" id="refundCompleteAmount" style="color: var(--color-success);">$0</div>
                </div>
                <!-- 退款證明上傳區塊 -->
                <div class="form-group">
                    <label class="form-label">退款證明 <span class="text-danger">*</span></label>
                    <div class="file-upload-area" id="refundCompleteFileDropZone">
                        <input type="file" class="file-upload-input" id="refundCompleteFileInput" multiple accept=".jpg,.jpeg,.png,.pdf">
                        <div class="file-upload-content">
                            <i class="fa-solid fa-cloud-upload-alt" style="font-size: 32px; color: var(--color-gray-500); margin-bottom: 8px;"></i>
                            <p style="margin: 0; color: var(--color-gray-700);">點擊或拖曳檔案至此處上傳</p>
                            <p style="margin: 4px 0 0; font-size: 12px; color: var(--color-gray-500);">支援格式：JPG, PNG, PDF（單檔最大 10MB）</p>
                        </div>
                    </div>
                    <!-- 已上傳檔案列表 -->
                    <div class="uploaded-files-list" id="refundCompleteUploadedFiles"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">備註說明</label>
                    <textarea class="form-textarea" id="refundCompleteNote" rows="3" placeholder="請輸入退款備註說明..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('refundCompleteModal')">取消</button>
                <button type="button" class="btn btn-primary" id="btnConfirmRefundComplete">
                    <i class="fa-solid fa-check"></i>
                    確認退款完成
                </button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- Toast 提示容器 -->
    <!-- ============================================ -->
    <div class="toast-container"></div>

    <!-- ============================================ -->
    <!-- JavaScript -->
    <!-- ============================================ -->
    <script src="js/menu-component.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/site-event-mock-data.js"></script>
    <script src="js/site-event-registration-edit.js"></script>


</body>
</html>
