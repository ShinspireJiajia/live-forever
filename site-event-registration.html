<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案場活動報名紀錄 - 陸府建設 CRM</title>
    
    <!-- Font Awesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- CSS 樣式 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/breadcrumb.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/tables.css">
    <link rel="stylesheet" href="css/pagination.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/site-event.css">
    <link rel="stylesheet" href="css/site-event-registration.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- 主容器 -->
    <!-- ============================================ -->
    <div class="app-container">
        
        <!-- ============================================ -->
        <!-- 頂部導覽列 (動態渲染) -->
        <!-- ============================================ -->
        <div id="header-container"></div>

        <!-- ============================================ -->
        <!-- 側邊欄選單 (動態渲染) -->
        <!-- ============================================ -->
        <div id="sidebar-container"></div>

        <!-- ============================================ -->
        <!-- 主內容區域 -->
        <!-- ============================================ -->
        <main class="main-content">
            <!-- 麵包屑導覽 -->
            <div class="breadcrumb">
                <a href="index.html" class="breadcrumb-item">
                    <i class="fa-solid fa-house"></i>
                    首頁
                </a>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item">案場活動</span>
                <span class="breadcrumb-separator">/</span>
                <span class="breadcrumb-item active">報名紀錄</span>
            </div>

            <!-- 活動資訊卡片 (當有指定活動時顯示) -->
            <div class="event-info-card" id="eventInfoCard" style="display: none;">
                <!-- JavaScript 動態產生 -->
            </div>

            <!-- 統計摘要列 -->
            <div class="stats-summary" id="statsGrid">
                <span class="stats-item">總報名數：<strong id="statTotal">0</strong></span>
                <span class="stats-divider">|</span>
                <span class="stats-item">待繳費：<strong id="statPending">0</strong></span>
                <span class="stats-divider">|</span>
                <span class="stats-item">已報名：<strong id="statPaid">0</strong></span>
                <span class="stats-divider">|</span>
                <span class="stats-item">已取消：<strong id="statCancelled">0</strong></span>
                <span class="stats-divider">|</span>
                <span class="stats-item">已收費：<strong id="statCollectedAmount">NT$ 0</strong></span>
                <span class="stats-divider">|</span>
                <span class="stats-item">應退費：<strong id="statPendingRefund">NT$ 0</strong></span>
                <span class="stats-divider">|</span>
                <span class="stats-item">已退費：<strong id="statRefundedAmount">NT$ 0</strong></span>
            </div>

            <!-- 查詢條件區 -->
            <div class="search-panel">
                <form class="site-reg-search-form" id="searchForm">
                    <div class="form-group">
                        <label class="form-label">活動名稱</label>
                        <select class="form-select" id="searchEventName">
                            <option value="">全部</option>
                            <!-- JavaScript 動態產生選項 -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">活動代碼</label>
                        <input type="text" class="form-control" id="searchEventCode" placeholder="請輸入活動代碼">
                    </div>
                    <div class="form-group">
                        <label class="form-label">報名者姓名</label>
                        <input type="text" class="form-control" id="searchName" placeholder="請輸入姓名">
                    </div>
                    <div class="form-group">
                        <label class="form-label">戶別</label>
                        <input type="text" class="form-control" id="searchUnit" placeholder="請輸入戶別">
                    </div>
                    <div class="form-group">
                        <label class="form-label">繳費狀態</label>
                        <select class="form-select" id="searchPaymentStatus">
                            <option value="">全部</option>
                            <option value="免費">免費</option>
                            <option value="未繳費">未繳費</option>
                            <option value="已繳費">已繳費</option>
                            <option value="待退款">待退款</option>
                            <option value="退款完成">退款完成</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">報名狀態</label>
                        <select class="form-select" id="searchRegStatus">
                            <option value="">全部</option>
                            <option value="已報名">已報名</option>
                            <option value="已取消">已取消</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            查詢
                        </button>
                        <button type="reset" class="btn btn-secondary">
                            <i class="fa-solid fa-rotate-left"></i>
                            重置
                        </button>
                    </div>
                </form>
            </div>

            <!-- 操作按鈕區 -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <!-- 左側功能區 (已移至右側) -->
                </div>
                <div class="toolbar-right">
                    <button class="btn btn-primary" id="btnAdd">
                        <i class="fa-solid fa-plus"></i>
                        新增報名
                    </button>
                    <button class="btn btn-secondary" id="btnExport">
                        <i class="fa-solid fa-file-excel"></i>
                        匯出名單
                    </button>
                </div>
            </div>

            <!-- 資料表格 -->
            <div class="table-container">
                <table class="site-event-table" id="registrationTable">
                    <thead>
                        <tr>
                            <th width="100">報名序號</th>
                            <th width="100">案場</th>
                            <th>活動名稱</th>
                            <th width="100">戶別</th>
                            <th>報名者</th>
                            <th width="120">聯絡電話</th>
                            <th width="70">報名人數</th>
                            <th width="100">金額</th>
                            <th width="90">繳費狀態</th>
                            <th width="90">報名狀態</th>
                            <th width="130">報名日期</th>
                            <th width="160">操作</th>
                        </tr>
                    </thead>
                    <tbody id="registrationTableBody">
                        <!-- JavaScript 動態產生 -->
                    </tbody>
                </table>
            </div>

            <!-- 分頁元件 -->
            <div class="pagination-wrapper" id="paginationWrapper">
            </div>
        </main>
    </div>

    <!-- ============================================ -->
    <!-- 新增報名彈窗 -->
    <!-- ============================================ -->
    <div class="modal-overlay" id="addModal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3 class="modal-title">新增報名</h3>
                <button type="button" class="modal-close" onclick="siteRegManager.closeAddModal()">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="addForm">
                    <div class="form-grid form-grid-2">
                        <div class="form-group">
                            <label class="form-label required">活動</label>
                            <input type="text" class="form-control" id="formEvent" readonly>
                        </div>
                        <div class="form-group">
                            <label class="form-label required">案場</label>
                            <input type="text" class="form-control" id="formSite" readonly>
                        </div>
                    </div>
                    <div class="form-grid form-grid-2">
                        <div class="form-group">
                            <label class="form-label required">戶別</label>
                            <select class="form-select" id="formUnit" required>
                                <option value="">請選擇戶別</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label required">報名者姓名</label>
                            <input type="text" class="form-control" id="formName" required>
                        </div>
                    </div>
                    <div class="form-grid form-grid-2">
                        <div class="form-group">
                            <label class="form-label required">聯絡電話</label>
                            <input type="tel" class="form-control" id="formPhone" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">攜伴人數</label>
                            <input type="number" class="form-control" id="formCompanion" min="0" value="0" placeholder="0 為僅本人">
                        </div>
                    </div>
                    <div class="form-grid form-grid-2">
                        <div class="form-group">
                            <label class="form-label required">支付方式</label>
                            <select class="form-select" id="formPaymentMethod" required>
                                <option value="">請選擇支付方式</option>
                                <option value="現金">現金</option>
                                <option value="線上支付">線上支付</option>
                            </select>
                        </div>
                        <div class="form-group" style="display: flex; align-items: center; padding-top: 30px;">
                            <label class="checkbox-container">
                                <input type="checkbox" id="formReceipt">
                                <span class="checkmark"></span>
                                <span class="label-text">需要索取收據</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">備註</label>
                        <textarea class="form-control" id="formRemark" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="siteRegManager.closeAddModal()">取消</button>
                <button type="button" class="btn btn-primary" onclick="siteRegManager.saveRegistration()">確認報名</button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 取消確認彈窗 -->
    <!-- ============================================ -->
    <div class="modal-overlay" id="cancelModal">
        <div class="modal modal-sm">
            <div class="modal-header">
                <h3 class="modal-title">取消報名與退款</h3>
                <button type="button" class="modal-close" onclick="siteRegManager.closeCancelModal()">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="delete-confirm-content">
                    <i class="fa-solid fa-triangle-exclamation delete-warning-icon"></i>
                    <p>確定要取消此報名紀錄嗎？</p>
                    <p class="text-sm text-gray-500" style="margin-top: 5px;">請確認是否已完成線下退款或其他處理。</p>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label class="form-label required">取消原因/備註</label>
                    <textarea class="form-control" id="cancelNote" rows="3" placeholder="請輸入取消原因或是退款備註..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="siteRegManager.closeCancelModal()">返回</button>
                <button type="button" class="btn btn-danger" onclick="siteRegManager.confirmCancel()">確認取消</button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- 通知發送彈窗 -->
    <!-- ============================================ -->
    <div class="modal-overlay" id="notifyModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">發送通知</h3>
                <button type="button" class="modal-close" onclick="siteRegManager.closeNotifyModal()">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="notification-settings">
                    <div class="notification-item">
                        <div class="notification-info">
                            <div class="notification-icon">
                                <i class="fa-solid fa-dollar-sign"></i>
                            </div>
                            <div class="notification-text">
                                <span class="notification-title">待繳費通知</span>
                                <span class="notification-desc">發送繳費提醒給待繳費的報名者</span>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-primary" onclick="siteRegManager.showToast('success', '發送成功', '已發送待繳費通知')">發送</button>
                    </div>
                    <div class="notification-item">
                        <div class="notification-info">
                            <div class="notification-icon">
                                <i class="fa-solid fa-check-circle"></i>
                            </div>
                            <div class="notification-text">
                                <span class="notification-title">報名成功通知</span>
                                <span class="notification-desc">通知已完成報名的住戶</span>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-primary" onclick="siteRegManager.showToast('success', '發送成功', '已發送報名成功通知')">發送</button>
                    </div>
                    <div class="notification-item">
                        <div class="notification-info">
                            <div class="notification-icon">
                                <i class="fa-solid fa-clock"></i>
                            </div>
                            <div class="notification-text">
                                <span class="notification-title">活動前提醒</span>
                                <span class="notification-desc">活動前提醒報名的住戶</span>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-primary" onclick="siteRegManager.showToast('success', '發送成功', '已發送活動前提醒')">發送</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="siteRegManager.closeNotifyModal()">關閉</button>
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- Toast 提示容器 -->
    <!-- ============================================ -->
    <div class="toast-container"></div>

    <!-- ============================================ -->
    <!-- JavaScript -->
    <!-- ============================================ -->
    <script src="js/menu-component.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/pagination.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/site-event-mock-data.js"></script>
    <script src="js/site-event-registration.js"></script>
</body>
</html>
