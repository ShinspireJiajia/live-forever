<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>檢視紀錄</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/crm-handover-record.css">
</head>
<body>

  <!-- 交屋服務檢視紀錄頁面容器 -->
  <div class="crm-handover-record" data-node-id="29:990">

    <!-- 裝飾性橢圓背景 -->
    <div class="decoration-ellipse" data-node-id="29:991">
      <img src="assets/ellipse-decoration.svg" alt="">
    </div>

    <!-- 頂部導覽列（凍結區塊） -->
    <div class="top-bar">
      <button class="btn-back" id="btnBack" data-node-id="29:1050" aria-label="返回">
        <img src="assets/arrow.svg" alt="">
        <img class="arrow-icon" src="assets/arrow-icon.svg" alt="">
      </button>
      <h1 class="page-title" data-node-id="29:1051">檢視紀錄</h1>
      <a class="btn-home" id="btnHome" href="#" data-node-id="244:523" aria-label="首頁">
        <img class="home-icon" src="assets/home-icon.svg" alt="">
        <span>首頁</span>
      </a>
    </div>

    <!-- 主要內容區域 -->
    <div class="record-content" data-node-id="29:992">

      <!-- 預約詳情卡片 -->
      <div class="detail-card" data-node-id="29:994">
        <p class="card-number">20250901-002</p>
        <div class="detail-list" data-node-id="29:995">
          <p class="detail-row" data-node-id="29:996">
            <span class="detail-label">建案</span>｜綠海建案
          </p>
          <p class="detail-row" data-node-id="29:997">
            <span class="detail-label">戶別</span>｜B1
          </p>
          <p class="detail-row" data-node-id="29:998">
            <span class="detail-label">樓層</span>｜3
          </p>
          <p class="detail-row" data-node-id="29:999">
            <span class="detail-label">日期</span>｜2025/08/21
          </p>
          <p class="detail-row" data-node-id="29:1000">
            <span class="detail-label">時段</span>｜10:00
          </p>
          <p class="detail-row" data-node-id="29:1001">
            <span class="detail-label">姓名</span>｜林木木
          </p>
          <p class="detail-row" data-node-id="29:1002">
            <span class="detail-label">手機</span>｜0988220229
          </p>
        </div>

        <!-- 分隔線 -->
        <div class="card-divider" data-node-id="29:1003">
          <img src="assets/divider-line2.svg" alt="">
        </div>

        <!-- 住戶簽名確認 -->
        <div class="signature-section" id="signatureSection">
          <p class="signature-title" data-node-id="29:1005">住戶簽名確認</p>
          <div class="signature-area" data-node-id="29:1006">
            <div class="signature-pad" id="signaturePad" data-node-id="29:1007">
              <p class="signature-placeholder" id="signaturePlaceholder" data-node-id="29:1008">點擊此處進行簽名</p>
              <!-- 已確認的簽名圖片 -->
              <img class="signature-result" id="signatureResult" src="" alt="簽名" style="display:none;">
            </div>
            <div class="signature-actions" data-node-id="29:1009">
              <button class="btn btn-clear-inline" id="btnClearSignInline" data-node-id="29:1010">
                清除簽名
              </button>
              <button class="btn btn-confirm-inline" id="btnConfirmSignInline" data-node-id="29:1012">
                確認簽名
              </button>
            </div>
          </div>
        </div>

        <!-- 全螢幕橫向簽名遮罩 -->
        <div class="signature-overlay" id="signatureOverlay">
          <div class="signature-overlay-inner">
            <p class="signature-overlay-title">請在下方區域簽名</p>
            <div class="signature-canvas-wrap">
              <canvas id="signatureCanvas"></canvas>
            </div>
            <div class="signature-overlay-actions">
              <button class="btn btn-clear" id="btnClearSign">清除簽名</button>
              <button class="btn btn-sign-confirm" id="btnConfirmSign">確認簽名</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 下載附件區 -->
      <div class="download-section" data-node-id="29:1014">
        <div class="section-header" data-node-id="29:1015">
          <img class="section-icon" src="assets/download-icon.svg" alt="" data-node-id="29:1016">
          <p class="section-title" data-node-id="29:1021">下載附件</p>
        </div>
        <div class="attachment-item" data-node-id="29:1022">
          <p class="file-name" data-node-id="29:1023">交屋報告.pdf</p>
          <button class="download-btn" data-action="download" data-file="handover-report.pdf" data-node-id="29:1024">
            <img src="assets/download-btn.svg" alt="下載">
          </button>
        </div>
      </div>

      <!-- 聯絡專員區 -->
      <div class="chat-section" data-node-id="29:1026">
        <div class="section-header" data-node-id="29:1027">
          <img class="section-icon" src="assets/chat-icon.svg" alt="" data-node-id="29:1028">
          <p class="section-title" data-node-id="29:1033">聯絡專員</p>
        </div>
        <div class="chat-area" data-node-id="29:1034">
          <div class="chat-messages" data-node-id="29:1035">
            <!-- 第1則：使用者訊息 -->
            <div class="chat-msg-user" data-node-id="29:1036">
              <div class="msg-bubble" data-node-id="29:1037">請問大約什麼時候可以維修？</div>
              <p class="msg-time" data-node-id="29:1039">2025/08/05 10:30 AM</p>
            </div>
            <!-- 第2則：專員回覆 -->
            <div class="chat-msg-agent" data-node-id="29:1041">
              <div class="msg-bubble" data-node-id="29:1042">您好，約下午會派維修人員過去</div>
              <div class="attachment-item" data-node-id="29:1044">
                <p class="file-name" data-node-id="29:1045">聯絡資訊.jpg</p>
                <button class="download-btn" data-action="download" data-file="contact.jpg" data-node-id="29:1046">
                  <img src="assets/download-btn2.svg" alt="下載">
                </button>
              </div>
              <p class="msg-sender" data-node-id="29:1048">王曉明 2025/08/05 10:30AM</p>
            </div>
          </div>
        </div>
        <!-- 我要留言按鈕 -->
        <button class="btn-leave-message" id="btnLeaveMessage">我要留言</button>
      </div>

    </div>
    <!-- /record-content -->

    <!-- 我要留言彈窗 -->
    <div class="message-modal-overlay" id="messageModalOverlay">
      <div class="message-modal">
        <!-- 訊息輸入區 -->
        <div class="message-input-area">
          <textarea class="message-textarea" id="messageTextarea" placeholder="請輸入訊息...."></textarea>
        </div>
        <!-- 附件上傳區 -->
        <div class="message-upload-area">
          <label class="btn-select-file" for="messageFileInput">
            選擇檔案
          </label>
          <input type="file" id="messageFileInput" accept=".jpg,.jpeg,.png,.mp4" style="display:none;">
          <!-- 已選檔案預覽 -->
          <div class="selected-file" id="selectedFile" style="display:none;">
            <p class="file-name" id="selectedFileName"></p>
            <button class="btn-remove-file" id="btnRemoveFile" aria-label="移除檔案">
              <img src="assets/delete-icon.svg" alt="刪除">
            </button>
          </div>
          <p class="upload-hint">＊支援圖片.jpg、影片.mp4，最大 5MB</p>
        </div>
        <!-- 操作按鈕 -->
        <div class="message-modal-actions">
          <button class="btn btn-modal-cancel" id="btnMsgCancel">離開</button>
          <button class="btn btn-modal-send" id="btnMsgSend">發送訊息</button>
        </div>
      </div>
    </div>

  </div>
  <!-- /crm-handover-record -->

  <script src="js/crm-handover-record.js"></script>

</body>
</html>
